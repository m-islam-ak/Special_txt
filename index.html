<!DOCTYPE html>
<html>
<head>
    <title>Just a Question ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('https://wallpaperaccess.com/full/1462767.jpg') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .overlay {
            background: rgba(0,0,0,0.7);
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            padding: 20px;
            max-width: 80%;
        }

        h2 {
            line-height: 1.6;
            font-size: 24px;
        }

        .start-btn {
            background-color: #ff4b2b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .start-btn:hover {
            background-color: #ff416c;
            transform: scale(1.05);
        }
    </style>

    <script>
        function startExperience() {
            let audio = document.getElementById("bgMusic");
            
            // Play audio first to satisfy browser requirements
            audio.play().catch(e => console.log("Audio play failed"));

            // Hide the button and start the logic
            document.getElementById("btnContainer").style.display = "none";

            setTimeout(() => {
                let name = prompt("What's your husband's name?");
                
                if (!name) {
                    document.getElementById("message").innerHTML = "Please refresh and enter a name.";
                    return;
                }

                name = name.toLowerCase();

                if (name.includes("anik") || name.includes("mahmudul") || name.includes("islam")) {
                    document.getElementById("message").innerHTML = `
                        What hurt the most wasn’t just the situation…<br><br>
                        it was you choosing to spend Pohela Boishakh with someone else, while knowing I cared about you.<br><br>
                        You could’ve handled it differently, but you didn’t.
                    `;
                } else {
                    document.getElementById("message").innerHTML = `
                        i thought i am your husband and you will write anik.
                    `;
                }
            }, 100);
        }
    </script>
</head>

<body>
    <div class="overlay">
        <div class="content">
            <div id="btnContainer">
                <button class="start-btn" onclick="startExperience()">Click to Open ❤️</button>
            </div>
            <h2 id="message"></h2>

            <audio id="bgMusic" loop>
                <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
                </audio>
        </div>
    </div>
</body>
</html>

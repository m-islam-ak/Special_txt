<!DOCTYPE html>
<html>
<head>
    <title>Just a Question ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://wallpaperaccess.com/full/1462767.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            padding: 30px;
            max-width: 600px;
            z-index: 10;
        }

        h2 {
            line-height: 1.8;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .start-btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
            transition: 0.3s;
        }

        .start-btn:hover {
            background: #c2185b;
            transform: translateY(-2px);
        }
    </style>

    <script>
        function startApp() {
            const audio = document.getElementById("bgMusic");
            const btn = document.getElementById("startBtn");

            // Load + play audio
            audio.load();

            audio.play()
                .then(() => {
                    console.log("Audio playing");
                    audio.volume = 0.3; // soft sad background
                })
                .catch(err => {
                    alert("Audio failed. Try another browser.");
                    console.log(err);
                });

            // Hide button
            btn.style.display = "none";

            // Ask name after delay
            setTimeout(() => {
                let name = prompt("What's your husband's name?");
                
                if (!name) {
                    document.getElementById("message").innerHTML = "Please refresh to try again.";
                    return;
                }

                name = name.toLowerCase();

                if (name.includes("anik") || name.includes("mahmudul") || name.includes("islam")) {
                    document.getElementById("message").innerHTML = `
                        What hurt the most wasn’t just the situation…<br><br>
                        it was you choosing to spend Pohela Boishakh with someone else, while knowing I cared about you.<br><br>
                        You could’ve handled it differently, but you didn’t.
                    `;
                } else {
                    document.getElementById("message").innerHTML = `
                        I thought I am your husband and you will write anik.
                    `;
                }
            }, 500);
        }
    </script>
</head>

<body>
    <div class="content">
        <button id="startBtn" class="start-btn" onclick="startApp()">Click to Open ❤️</button>
        <h2 id="message"></h2>

        <!-- FREE sad background music (no download needed) -->
        <audio id="bgMusic" loop preload="auto">
            <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=sad-piano-ambient-110624.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Just a Question ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://wallpaperaccess.com/full/1462767.jpg') no-repeat center center/cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .content {
            padding: 30px;
            max-width: 600px;
            z-index: 10;
        }

        h2 {
            line-height: 1.8;
            font-weight: 300;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            font-size: 22px;
        }

        .start-btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(233, 30, 99, 0.5);
            transition: 0.4s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .start-btn:hover {
            background: #c2185b;
            transform: scale(1.1);
        }
    </style>

    <script>
        function startApp() {
            const audio = document.getElementById("bgMusic");
            const btn = document.getElementById("startBtn");

            audio.play().then(() => {
                console.log("Music started");
            }).catch(err => {
                console.log("Playback failed", err);
            });

            btn.style.display = "none";

            setTimeout(() => {
                // Updated the prompt message here
                let response = prompt("I have something to tell you, to proceed type yes");
                
                if (!response) {
                    document.getElementById("message").innerHTML = "Please refresh to try again.";
                    return;
                }

                let choice = response.toLowerCase().trim();

                if (choice === "yes") {
                    document.getElementById("message").innerHTML = `
                        it was you choosing to spend Pohela Boishakh with someone else, while knowing I cared about you.<br><br>
                        You could’ve handled it differently, but you didn’t.
                    `;
                } else {
                    document.getElementById("message").innerHTML = `
                        i thought i am your husband and you will write anik.
                    `;
                }
            }, 800);
        }
    </script>
</head>

<body>
    <div class="content">
        <button id="startBtn" class="start-btn" onclick="startApp()">Click to Open ❤️</button>
        <h2 id="message"></h2>

        <audio id="bgMusic" loop>
            <source src="./audio/sad-music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Just a Question ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('https://wallpaperaccess.com/full/1462767.jpg') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .content {
            position: relative;
            top: 25%;
            padding: 20px;
        }

        h2 {
            line-height: 1.6;
        }
    </style>

    <script>
        function askName() {
            let name = prompt("What's your husband's name?");
            let audio = document.getElementById("bgMusic");

            // Play the song "Alo" after the user interacts with the prompt
            if (audio) {
                audio.volume = 0.5; // Set volume to 50%
                audio.play().catch(e => console.log("Audio play prevented by browser. Click anywhere to play."));
            }
            
            if (!name) return;

            name = name.toLowerCase();

            if (name.includes("anik") || name.includes("mahmudul") || name.includes("islam")) {
                document.getElementById("message").innerHTML = `
                    What hurt the most wasn’t just the situation…<br><br>
                    it was you choosing to spend Pohela Boishakh with someone else, while knowing I cared about you.<br><br>
                    You could’ve handled it differently, but you didn’t.
                `;
            } else {
                document.getElementById("message").innerHTML = `
                    I thought I am your husband and you will write anik.
                `;
            }
        }
    </script>
</head>

<body onload="askName()">
    <div class="overlay">
        <div class="content">
            <h2 id="message"></h2>

            <audio id="bgMusic" loop>
                <source src="https://www.dropbox.com/scl/fi/v6i36v3r8f8w5q2/Tahsan-Alo.mp3?rlkey=7j9x3v7k8l9m0n1p2q3r4s5t6&raw=1" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>
</body>
</html>
